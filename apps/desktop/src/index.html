<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larkup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!--
    ┌──────────────────────────────────────────────────────────────┐
    │  LICENSE GATE                                                │
    │                                                              │
    │  Enterprise license validation. See packages/ee for the      │
    │  planned RBAC/SSO features that will require a license key.  │
    └──────────────────────────────────────────────────────────────┘
  -->
  <div id="license-gate" class="screen" style="display: none;">
    <div class="card">
      <div class="logo-area">
        <img src="logo.png" width="48" height="48" alt="Larkup Logo" style="border-radius: 12px; object-fit: contain;" />
        <h1>Larkup</h1>
      </div>
      <p class="subtitle">Enter your enterprise license key to get started.</p>
      <div class="input-group">
        <input
          type="text"
          id="license-input"
          placeholder="XXXX-XXXX-XXXX-XXXX"
          spellcheck="false"
          autocomplete="off"
        />
        <button id="activate-btn">Activate</button>
      </div>
      <p id="license-error" class="error" style="display: none;"></p>
      <p class="hint">Contact <strong>sales@larkup.de</strong> if you need a key.</p>
    </div>
  </div>

  <!-- Loading Splash -->
  <div id="splash" class="screen">
    <div class="card">
      <div class="logo-area">
        <img src="logo.png" width="48" height="48" alt="Larkup Logo" style="border-radius: 12px; object-fit: contain;" />
        <h1>Larkup</h1>
      </div>
      <p class="subtitle">Starting Larkup Studio...</p>
      <div id="spinner" class="spinner"></div>
      <p id="status-text" class="status">Waiting for the server to boot</p>
      <div id="retry-container" style="display: none; margin-top: 20px;">
        <button id="retry-btn" class="action-btn">Retry Connection</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
