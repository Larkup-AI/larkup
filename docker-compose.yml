services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      shm_size: "2gb"
    ports:
      - "4567:4567"
    environment:
      - NODE_ENV=production
      - DOCKER_BUILD=1
    volumes:
      # Persist data directories
      - ./data:/app/data
      - ./apps/web/data:/app/apps/web/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
