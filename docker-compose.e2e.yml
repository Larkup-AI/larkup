# ──────────────────────────────────────────────────────────────────
# docker-compose.e2e.yml
# ──────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit
#
#   # Or via the npm script:
#   pnpm --filter @larkup/e2e test:docker
# ──────────────────────────────────────────────────────────────────

services:
  # ── App Under Test ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      shm_size: "2gb"
    environment:
      NODE_ENV: production
      DOCKER_BUILD: "1"
      PORT: "4567"
      HOSTNAME: "0.0.0.0"
    # Ephemeral volumes — no host state leaks into tests
    tmpfs:
      - /app/data
      - /app/apps/web/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4567', (r) => process.exit(r.statusCode < 500 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - e2e-net

  # ── Playwright Test Runner ─────────────────────────────────────
  e2e:
    build:
      context: .
      dockerfile: apps/e2e/Dockerfile
    depends_on:
      web:
        condition: service_healthy
    environment:
      # Override the base URL to point at the `web` container
      PLAYWRIGHT_BASE_URL: "http://web:4567"
      # Forward any API keys needed for integration tests
      AI_GATEWAY_APIKEY: "${AI_GATEWAY_APIKEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      PINECONE_APIKEY: "${PINECONE_APIKEY:-}"
    volumes:
      # Mount reports/results OUT to host so you can view them after
      - ./apps/e2e/playwright-report:/e2e/playwright-report
      - ./apps/e2e/test-results:/e2e/test-results
    networks:
      - e2e-net

networks:
  e2e-net:
    driver: bridge
