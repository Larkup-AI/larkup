services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      shm_size: "2gb"
    ports:
      - "4567:4567"
    environment:
      - NODE_ENV=production
      - DOCKER_BUILD=1
      - TMPDIR=/app/.tmp
    volumes:
      # All configs, corpus records, media, LanceDB indexes, and installed tools.
      - larkup_data:/app/.larkup
      # Keep large transient frame/audio files out of the container layer.
      - media_tmp:/app/.tmp
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  larkup_data:
  media_tmp:
