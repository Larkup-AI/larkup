services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        NEXT_PUBLIC_DOCKER_ENV: "true"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
      - app_web_data:/app/apps/web/data
    environment:
      # Node.js Configuration
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      NEXT_TELEMETRY_DISABLED: 1

      # Application Configuration
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_DOCKER_ENV: true
      DOCKER_ENV: true

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/database.db}

      # Authentication Configuration (REQUIRED - set in .env)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      # Vector Store Configuration
      VECTOR_STORE_PATH: /app/data/vector_stores

      # Chroma Configuration
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: '["*"]'

      # Optional: Telemetry
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}

    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 4G

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - app_network

  # ── Web Crawler (optional) ──────────────────────────────────────
  # Activate with: docker compose --profile crawler up
  # These services run Firecrawl for web scraping & search.

  crawler-redis:
    image: redis:7-alpine
    profiles: ["crawler"]
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - app_network

  crawler-db:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    profiles: ["crawler"]
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
      POSTGRES_DB: firecrawl
    volumes:
      - crawler_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app_network

  crawler-rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["crawler"]
    environment:
      RABBITMQ_DEFAULT_USER: crawler
      RABBITMQ_DEFAULT_PASS: crawler
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  crawler-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    profiles: ["crawler"]
    environment:
      PORT: "3000"
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    networks:
      - app_network

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    profiles: ["crawler"]
    depends_on:
      - crawler-db
      - crawler-rabbitmq
      - crawler-redis
      - crawler-playwright
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
      REDIS_URL: "redis://crawler-redis:6379"
      REDIS_RATE_LIMIT_URL: "redis://crawler-redis:6379"
      PLAYWRIGHT_MICROSERVICE_URL: "http://crawler-playwright:3000/scrape"
      USE_DB_AUTHENTICATION: "false"
      # Any bearer token is accepted with DB auth disabled
      TEST_API_KEY: "fc-docker-local"
      BULL_AUTH_KEY: "fc-docker-local"
      DATABASE_URL: "postgresql://crawler:crawler@crawler-db:5432/firecrawl"
      NUQ_DATABASE_URL: "postgresql://crawler:crawler@crawler-db:5432/firecrawl"
      NUQ_RABBITMQ_URL: "amqp://crawler:crawler@crawler-rabbitmq:5672"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3002', (r) => process.exit(r.statusCode > 0 ? 0 : 1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app_network

volumes:
  app_data:
    driver: local
  app_web_data:
    driver: local
  crawler_db_data:
    driver: local

networks:
  app_network:
    driver: bridge
