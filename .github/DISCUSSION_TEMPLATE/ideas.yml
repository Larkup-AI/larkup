name: Ideas
description: Share an idea for a new feature or improvement
title: '[Idea] '
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your ideas with us! 🚀

  - type: textarea
    attributes:
      label: Describe your idea
      description: A clear and concise description of what you want to achieve or improve.
      placeholder: 'I think it would be great if Larkup could...'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Motivation
      description: Why do you want this feature? What problem does it solve?
    validations:
      required: true
