name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Lint
        run: pnpm lint

      - name: Create dummy sidecar binary for Tauri build
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          touch apps/desktop/src-tauri/binaries/larkup-server-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/larkup-server-x86_64-unknown-linux-gnu

      - name: Build
        run: pnpm build
