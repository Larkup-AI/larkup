name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false

permissions:
  contents: write

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            pkg-target: node20-macos-arm64
            binary-suffix: ''
          - os: macos-13
            rust-target: x86_64-apple-darwin
            pkg-target: node20-macos-x64
            binary-suffix: ''
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            pkg-target: node20-win-x64
            binary-suffix: '.exe'
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            pkg-target: node20-linux-x64
            binary-suffix: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js standalone
        run: pnpm --filter larkup build

      - name: Copy static assets
        shell: bash
        run: |
          STANDALONE="apps/web/.next/standalone"
          cp -r apps/web/.next/static "$STANDALONE/apps/web/.next/static"
          if [ -d "apps/web/public" ]; then
            cp -r apps/web/public "$STANDALONE/apps/web/public"
          fi

      - name: Package sidecar with @yao-pkg/pkg
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          BINARY_NAME="larkup-server-${{ matrix.rust-target }}${{ matrix.binary-suffix }}"
          npx -y @yao-pkg/pkg \
            "apps/web/.next/standalone/apps/web/server.js" \
            --target "${{ matrix.pkg-target }}" \
            --output "apps/desktop/src-tauri/binaries/$BINARY_NAME" \
            --compress GZip

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.rust-target }}
          path: apps/desktop/src-tauri/binaries/
          retention-days: 1

  build-tauri:
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            bundle-targets: dmg
          - os: macos-13
            rust-target: x86_64-apple-darwin
            bundle-targets: dmg
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundle-targets: nsis
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundle-targets: appimage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.rust-target }}
          path: apps/desktop/src-tauri/binaries/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x apps/desktop/src-tauri/binaries/*

      - name: Build Tauri app
        working-directory: apps/desktop
        run: pnpm build -- --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle-targets }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.rust-target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 7

  create-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: ./release-assets/

      - name: List release assets
        run: find ./release-assets -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Larkup Desktop ${{ github.ref_name }}
          body: |
            ## Larkup Desktop ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `Larkup_*_aarch64.dmg` |
            | macOS | Intel | `Larkup_*_x64.dmg` |
            | Windows | x64 | `Larkup_*_x64-setup.exe` |
            | Linux | x64 | `Larkup_*_amd64.AppImage` |

            ### Installation

            **macOS/Linux (curl):**
            ```bash
            curl -fsSL https://larkup.de/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://larkup.de/install.ps1 | iex
            ```
          files: ./release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
