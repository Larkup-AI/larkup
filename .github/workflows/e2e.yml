name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.11.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Install Playwright Browsers
      run: pnpm --filter @larkup/e2e exec playwright install --with-deps

    - name: Build Web App
      run: pnpm turbo build --filter "./apps/web"
      env:
        E2E_BUILD: "true"

    - name: Run E2E tests
      run: |
        pnpm --filter "./apps/web" start &
        pnpm dlx wait-on http://localhost:4567 -t 60000
        cd e2e
        pnpm test:e2e
      env:
        CI: true

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 14
